services:
  # PostgreSQL database
  db:
    image: postgres:16-alpine
    container_name: travelplanner-db
    environment:
      POSTGRES_USER: ${DB_USER:-traveler}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:-travelplanner}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-traveler}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - travelplanner
    restart: unless-stopped

  # Next.js application
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-build-time-placeholder-secret-32-characters}
    container_name: travelplanner-app
    environment:
      DATABASE_URL: postgresql://${DB_USER:-traveler}:${DB_PASSWORD:?DB_PASSWORD is required}@db:5432/${DB_NAME:-travelplanner}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000} # dev default; deploy file requires this to be set explicitly
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required. Generate with: openssl rand -base64 32}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-TravelPlanner <onboarding@resend.dev>}
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/public/uploads
    networks:
      - travelplanner
    restart: unless-stopped

  # Cloudflare Tunnel (optional - comment out if not using tunnel)
  # tunnel:
  #   image: cloudflare/cloudflared:latest
  #   container_name: travelplanner-tunnel
  #   command: tunnel run
  #   environment:
  #     CLOUDFLARE_DNS_TOKEN: ${CLOUDFLARE_TOKEN}
  #   depends_on:
  #     app:
  #       condition: service_started
  #   networks:
  #     - travelplanner
  #   restart: unless-stopped

networks:
  travelplanner:
    driver: bridge

volumes:
  postgres_data:
  uploads_data:
